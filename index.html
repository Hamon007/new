<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Black Knot - Ermittlungszentrale</title>
  <meta name="description" content="Interaktiver Ermittlungs-Thriller als offlinefaehige PWA.">
  <meta name="theme-color" content="#11161f">
  <link rel="manifest" href="./manifest.json">
  <style>
    :root {
      --bg-0: #0c1118;
      --bg-1: #111826;
      --panel: rgba(16, 23, 33, 0.92);
      --line: #2f3f59;
      --text: #e8edf6;
      --muted: #a8b4c9;
      --accent: #7ac1ff;
      --accent-2: #8ad7cb;
      --shadow: 0 16px 36px rgba(2, 7, 13, 0.46);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--text);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      background:
        radial-gradient(1200px 700px at 90% -10%, rgba(63, 124, 186, 0.24), transparent),
        radial-gradient(1000px 700px at -10% 120%, rgba(80, 146, 128, 0.18), transparent),
        linear-gradient(130deg, var(--bg-0), var(--bg-1) 52%, #0a0f17);
    }

    .shell {
      max-width: 1240px;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .header {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(120deg, rgba(22, 31, 45, 0.95), rgba(12, 17, 26, 0.95));
      box-shadow: var(--shadow);
    }

    .title {
      margin: 0;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 14px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      padding: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(2px);
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 0.92rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--accent-2);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      font-size: 0.78rem;
      border: 1px solid var(--line);
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(12, 17, 26, 0.8);
    }

    .status {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .metric {
      padding: 9px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(13, 20, 31, 0.8);
      font-size: 0.8rem;
      color: var(--muted);
    }

    .metric b {
      display: block;
      color: var(--text);
      font-size: 1rem;
      margin-top: 2px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    select, button {
      width: 100%;
      border-radius: 9px;
      border: 1px solid var(--line);
      background: #101725;
      color: var(--text);
      padding: 9px 10px;
      font-family: inherit;
      font-size: 0.86rem;
    }

    button {
      cursor: pointer;
      border: 0;
      font-weight: 600;
      background: linear-gradient(120deg, #2c5f92, #2a7a71);
    }

    button.secondary {
      background: #162034;
      border: 1px solid var(--line);
      font-weight: 500;
    }

    .list {
      display: grid;
      gap: 8px;
      max-height: 330px;
      overflow: auto;
      padding-right: 2px;
    }

    .entry {
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 9px;
      background: rgba(10, 15, 22, 0.86);
      font-size: 0.84rem;
      line-height: 1.4;
    }

    .entry p {
      margin: 6px 0;
      color: var(--muted);
    }

    .stack {
      display: grid;
      gap: 8px;
    }

    .row {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr 1fr;
    }

    .result {
      margin-top: 10px;
      border-left: 3px solid var(--accent);
      padding: 8px 10px;
      background: rgba(12, 20, 30, 0.85);
      border-radius: 8px;
      font-size: 0.87rem;
    }

    .muted { color: var(--muted); }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .status { grid-template-columns: 1fr; }
      .controls { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="header">
      <h1 class="title">Black Knot | Deterministische Fallrekonstruktion</h1>
      <p class="subtitle">CASE-001 "Die weisse Stunde" mit Flag-Prioritaeten, Konfliktregeln und klarer Ending-Priorisierung.</p>
    </header>

    <section class="grid">
      <article class="panel">
        <h2>Briefing</h2>
        <div id="briefingText"></div>
        <div class="meta" id="briefingMeta"></div>
      </article>

      <article class="panel">
        <h2>Fortschritt</h2>
        <p id="progressText" class="muted"></p>
        <div class="status">
          <div class="metric">Szenen<b id="metricScenes">0</b></div>
          <div class="metric">Hinweise<b id="metricClues">0</b></div>
          <div class="metric">Aktive Flags<b id="metricFlags">0</b></div>
        </div>
      </article>
    </section>

    <section class="grid">
      <article class="panel">
        <h2>Szenenlauf</h2>
        <div class="controls">
          <select id="sceneSelect"></select>
          <button id="enterSceneBtn">Szene oeffnen</button>
        </div>
        <div id="currentScene" class="stack"></div>
        <div id="sceneChoices" class="list"></div>
      </article>

      <article class="panel">
        <h2>Hinweise</h2>
        <div id="clues" class="list"></div>
      </article>
    </section>

    <section class="grid">
      <article class="panel">
        <h2>Hypothesenstatus</h2>
        <div id="hypotheses" class="list"></div>
      </article>

      <article class="panel">
        <h2>Flag-Lagebild</h2>
        <div id="activeFlags" class="list"></div>
      </article>
    </section>

    <section class="panel">
      <h2>Fallabschluss</h2>
      <div class="row">
        <button class="secondary" id="saveBtn">Stand speichern</button>
        <button class="secondary" id="resetBtn">Progress zuruecksetzen</button>
        <button id="endingBtn">Ending deterministisch auswerten</button>
      </div>
      <div id="endingResult" class="result" hidden></div>
    </section>
  </main>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
